<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Login | Higher Marketing Plus</title>
    <link rel="stylesheet" href="/platform-assets/hmp-brand.css" />
    <link rel="stylesheet" href="/platform-assets/site.css" />
    <script type="module" src="/platform-assets/portal.js"></script>
  </head>
  <body>
    <div class="hmp-shell">
      <header class="hmp-topbar">
        <a class="hmp-brand" href="/"><span class="hmp-brand-mark"></span><span>Higher Marketing Plus</span></a>
      </header>
      <main class="hmp-section">
        <span class="site-tag">Portal Login</span>
        <h1 class="hmp-display site-page-head">Client portal access is provisioned, not self-created.</h1>
        <div class="site-columns">
          <article class="hmp-card">
            <h2>Login shell</h2>
            <p class="hmp-muted">Your final portal credentials are issued by Higher Marketing Plus after workspace setup.</p>
            <form class="hmp-form">
              <label>Email<input type="email" placeholder="client@example.com" /></label>
              <label>Password<input type="password" placeholder="Provisioned password" /></label>
              <button class="hmp-button-secondary" type="button">Provisioned access only</button>
            </form>
            <p class="site-note">This first wave is a branded shell, not a public client-services self-signup flow.</p>
          </article>
          <article class="hmp-card">
            <h2>Request access</h2>
            <form class="hmp-form" data-portal-access-form>
              <label>Name<input name="contact_name" required /></label>
              <label>Email<input name="contact_email" type="email" required /></label>
              <label>Company<input name="company" required /></label>
              <label>Requested use case<textarea name="requested_use_case" rows="4" required></textarea></label>
              <button class="hmp-button" type="submit">Request portal access</button>
              <div class="hmp-status" data-portal-access-status></div>
            </form>
          </article>
        </div>
      </main>
    </div>
  </body>
  </html>
